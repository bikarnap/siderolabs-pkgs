name: build-nvgpu-pkg

on:
  push:
    branches:
      - tegra-nvgpu
    paths:
      - nvgpu-pkg/**
      - Pkgfile
  workflow_dispatch: {}

concurrency:
  group: ${{ github.ref }}-nvgpu
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm64
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install bldr
        run: |
          curl -fsSL https://github.com/siderolabs/bldr/releases/download/v0.5.6/bldr-linux-arm64 \
            -o /usr/local/bin/bldr
          chmod +x /usr/local/bin/bldr

      - name: Build nvgpu-pkg
        run: |
          bldr build \
            --target nvgpu-pkg \
            --platform linux/arm64 \
            --push \
            --tag ghcr.io/${{ github.repository_owner }}/nvgpu-pkg:${{ github.sha }}
